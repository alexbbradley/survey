name: Deploy to SiteGround

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SITEGROUND_SSH_KEY }}

      - name: Add SiteGround to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 18765 ssh.abstaging.space >> ~/.ssh/known_hosts

      - name: Deploy by pushing to SiteGround deploy repo
        env:
          SITEGROUND_DEPLOY_URL: ssh://u3263-ryza4qha3dqt@ssh.abstaging.space:18765/home/customer/www/survey.abstaging.space/survey.git
        run: |
          git remote add siteground "$SITEGROUND_DEPLOY_URL" || true
          git push siteground HEAD:master --force
